# ---------- 主要部分 ----------
# 放置在这些部分下的页面将显示在主页和存档页面上。
mainSections = ["post"]

# ---------- RSS 设置 ----------
# 在 RSS 中输出页面的完整内容。
rssFullContent = true

# ---------- 网站图标 ----------
favicon = "/favicon.png"

# ---------- 页脚设置 ----------
[footer]
since = 2023
customText = ""

# ---------- 日期格式 ----------
[dateFormat]
published = "Jan 02, 2006"
lastUpdated = "Jan 02, 2006 15:04 MST"

# ---------- 侧边栏设置 ----------
[sidebar]
emoji = "❤️‍🩹"
subtitle = "Attention is all you need"

[sidebar.avatar]
enabled = true
local = true
src = "img/avatar.jpg"

# ---------- 文章设置 ----------
[article]
headingAnchor = true
math = true
readingTime = true

[article.license]
enabled = true
default = "Licensed under CC 4.0 BY-SA"

# ---------- 小部件 ----------
[[widgets.homepage]]
type = "search"

[[widgets.homepage]]
type = "archives"

[widgets.homepage.params]
limit = 5

[[widgets.homepage]]
type = "categories"

[widgets.homepage.params]
limit = 10

[[widgets.homepage]]
type = "tag-cloud"

[widgets.homepage.params]
limit = 10

[[widgets.page]]
type = "toc"

# ---------- Open Graph 设置 ----------
[opengraph.twitter]
site = ""
card = "summary_large_image"

[defaultImage.opengraph]
enabled = false
local = false
src = ""

# ---------- 颜色方案 ----------
[colorScheme]
toggle = true
default = "auto"

# ---------- 图像处理 ----------
[imageProcessing.cover]
enabled = true

[imageProcessing.content]
enabled = true

# ---------- 评论设置 ----------
[comments]
